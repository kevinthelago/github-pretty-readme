name: Update repo README

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'express.js'
      - 'src/tiles/**'
      - 'src/data/**'
      - 'src/github/**'
      - 'scripts/update-readme.mjs'

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - run: npm install

      - name: Generate README
        env:
          GOOGLE_AI_STUDIO_KEY: ${{ secrets.GOOGLE_AI_STUDIO_KEY }}
        run: node scripts/update-readme.mjs

      - name: Commit README if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: auto-update README [skip ci]"
          git push
