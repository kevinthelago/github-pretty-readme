name: Update profile summary

on:
  schedule:
    - cron: '0 * * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - run: npm install

      - name: Start server
        env:
          GOOGLE_AI_STUDIO_KEY: ${{ secrets.GOOGLE_AI_STUDIO_KEY }}
          AI_PROMPT: ${{ secrets.AI_PROMPT }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          port: 8080
        run: node express.js > /tmp/server.log 2>&1 &

      - name: Wait for server
        run: |
          for i in $(seq 1 20); do
            curl -sf "http://localhost:8080/account-summary?username=kevinthelago" > /dev/null && echo "Server ready" && break
            sleep 2
          done
          echo "=== Server log ==="
          cat /tmp/server.log || true
          curl -sf "http://localhost:8080/account-summary?username=kevinthelago" > /dev/null || (echo "Server never started" && exit 1)

      - name: Fetch account summary SVG
        run: |
          curl -f "http://localhost:8080/account-summary?username=kevinthelago&background=cherry-blossom" \
            -o account-summary.svg

      - name: Update tech badges in profile README
        env:
          PROFILE_REPO_TOKEN: ${{ secrets.PROFILE_REPO_TOKEN }}
          port: 8080
        run: node scripts/update-readme-tech.mjs kevinthelago

      - name: Push account summary SVG to profile repo
        env:
          GH_TOKEN: ${{ secrets.PROFILE_REPO_TOKEN }}
        run: |
          sha=$(gh api "repos/kevinthelago/kevinthelago/contents/assets/account-summary.svg" --jq '.sha' 2>/dev/null || echo "")
          content=$(base64 -w 0 account-summary.svg)
          if [ -n "$sha" ]; then
            gh api "repos/kevinthelago/kevinthelago/contents/assets/account-summary.svg" \
              --method PUT \
              -f message="chore: update account-summary.svg" \
              -f content="$content" \
              -f sha="$sha"
          else
            gh api "repos/kevinthelago/kevinthelago/contents/assets/account-summary.svg" \
              --method PUT \
              -f message="chore: update account-summary.svg" \
              -f content="$content"
          fi
